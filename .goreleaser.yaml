version: 2
project_name: conduyt-crm-pp-cli
changelog:
  disable: true
builds:
  - id: conduyt-crm-pp-cli
    main: ./cmd/conduyt-crm-pp-cli
    binary: conduyt-crm-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X conduyt-crm-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: conduyt-crm-pp-mcp
    main: ./cmd/conduyt-crm-pp-mcp
    binary: conduyt-crm-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: conduyt-crm-pp-cli
    repository:
      owner: ptaramona
      name: homebrew-tap
    homepage: "https://github.com/ptaramona/conduyt-crm-pp-cli"
    description: "Full-coverage Conduyt CLI: every endpoint, plus Kloudi-grade send-safety forensics no other surface has."
    install: |
      bin.install "conduyt-crm-pp-cli"
      bin.install "conduyt-crm-pp-mcp"
