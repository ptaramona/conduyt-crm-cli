      description: Returns API key metadata. Never returns the full key.
      tags: [ API Keys ]
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createApiKey
      summary: Generate a new API key (owner/admin only)
      description: Returns the full key exactly once. Store it securely.
      tags: [ API Keys ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ name ]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                scopes:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: API key created (includes full key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      keyPrefix:
                        type: string
                      key:
                        type: string
                        description: Full API key (shown once)
                      createdAt:
                        type: string
                        format: date-time
        "403":
          $ref: "#/components/responses/Forbidden"

  /api-keys/check:
    get:
      operationId: checkApiKey
      summary: Check current API key metadata
      description: Returns tier, scopes, rate limit, IP allowlist, and usage for the API key used on the request.
      tags: [ API Keys ]
      responses:
        "200":
          description: API key metadata
        "400":
          description: Request was not authenticated with an API key

  /api-keys/{id}:
    patch:
      operationId: updateApiKey
      summary: Update an API key
      description: Update key name, tier, scopes, IP allowlist, rate limit, and optional expiry. API-key auth cannot manage API keys.
      tags: [ API Keys ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                tier:
                  type: string
                  enum: [ read, write, admin ]
                scopes:
                  type: array
                  items:
                    type: string
                ipAllowlist:
                  type: array
                  items:
                    type: string
                rateLimit:
                  type: integer
                  minimum: 1
                  maximum: 10000
                expiresAt:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          description: API key updated
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      operationId: revokeApiKey
      summary: Revoke an API key
      tags: [ API Keys ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
