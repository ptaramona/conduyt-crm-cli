  # ──────────────────────────────────────────────
  # Imports
  # ──────────────────────────────────────────────
  /imports:
    get:
      operationId: listImports
      summary: List import jobs
      tags: [ Imports ]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Paginated import jobs
    post:
      operationId: createImport
      summary: Create an import job
      tags: [ Imports ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ objectType ]
              oneOf:
                - title: CSV import job
                  required: [ fileName ]
                  not:
                    required: [ rows ]
                  properties:
                    format:
                      type: string
                      enum: [ csv ]
                - title: JSON import job
                  required: [ rows ]
                  properties:
                    format:
                      type: string
                      enum: [ json ]
              properties:
                objectType:
                  type: string
                  enum: [ contacts, opportunities, companies ]
                fileName:
                  type: string
                  description: Required for CSV imports; optional in JSON mode because the server synthesizes a CSV file name.
                format:
                  type: string
                  enum: [ csv, json ]
                  description: Set to json to submit inline row objects through rows instead of uploading or referencing a CSV file.
                rows:
                  type: array
                  description: JSON mode only. Row objects whose keys map to Conduyt import fields; nested customFields objects are flattened to customFields.<key> columns.
                  minItems: 1
                  items:
                    type: object
                    additionalProperties: true
                fileUrl:
                  type: string
                  format: uri
                importMode:
                  type: string
                  enum: [ create_and_update, create_only, update_only ]
                  default: create_and_update
                mappings:
                  type: object
                  description: CSV column to Conduyt field mapping. Required for CSV imports; synthesized from row keys in JSON mode when omitted.
                removeDuplicates:
                  type: boolean
                  default: false
                duplicateCheckFields:
                  type: array
                  items:
                    type: string
                smartListId:
                  type: string
                  format: uuid
                tagIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                reEnrollMode:
                  type: string
                  enum: [additional]
                  nullable: true
                  description: Persisted re-enrollment choice — "additional" re-tags existing matched contacts so they re-enter the campaign (non-destructive). Honored across cron/stale resumes.
                verifyLineType:
                  type: boolean
                  nullable: true
                  description: Opt-in Twilio line-type verification of the imported contacts (tenant-paid, ~$0.008/number). Only honored on a contacts import into an EMPTY smart list; requires the account's lineTypeVerificationEnabled Twilio setting. Verification runs after completion (foreground wizard loop or the verify-line-types cron).
      responses:
        "201":
          description: Import job created

  /imports/upload:
    post:
      operationId: uploadImportFile
      summary: Upload a CSV file for import
      tags: [ Imports ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
