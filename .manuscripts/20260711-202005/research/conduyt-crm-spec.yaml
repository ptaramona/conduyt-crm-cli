# ──────────────────────────────────────────────────
# Components
# ──────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        API key authentication. Generate keys in Settings > API Keys.
        Keys use the `cdy_` prefix.

        Example: `Authorization: Bearer cdy_a1b2c3d4e5f6...`

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      description: Items per page (max 200)
    SearchParam:
      name: search
      in: query
      schema:
        type: string
      description: Full-text search query

  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until next allowed request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [ error ]
      properties:
        error:
          type: string
        code:
          type: string
          description: Machine-readable error code (e.g., TRIAL_EXPIRED, PLAN_LIMIT_REACHED)

    DataEnvelope:
      type: object
      properties:
        data:
          description: Response payload (shape varies by endpoint)

    PaginatedResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            data:
              type: array
              items: {}
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                lastName:
                  type: string
            account:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                slug:
                  type: string
                plan:
                  type: string
            role:
              type: string
            accounts:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  slug:
                    type: string
                  plan:
                    type: string
                  role:
                    type: string

    # ── Core Entity Schemas ──

    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 30
        company:
          type: string
          maxLength: 200
        companyId:
          type: string
          format: uuid
        jobTitle:
          type: string
          maxLength: 150
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string
          default: US
        avatarUrl:
          type: string
          format: uri
        source:
          type: string
        customFields:
          type: object
        metadata:
          type: object
        leadScore:
          type: integer
          default: 0
        optedOutSms:
          type: boolean
          default: false
        optedOutEmail:
          type: boolean
          default: false
        lastContactedAt:
          type: string
          format: date-time
        assignedTo:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ContactCreate:
      type: object
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 30
        company:
          type: string
          maxLength: 200
        companyId:
          type: string
          format: uuid
        jobTitle:
          type: string
          maxLength: 150
        source:
          type: string
          maxLength: 100
        addressLine1:
          type: string
          maxLength: 200
        addressLine2:
          type: string
          maxLength: 200
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        zip:
          type: string
          maxLength: 20
        country:
          type: string
          maxLength: 2
        assignedTo:
          type: string
          format: uuid
        tags:
          type: array
          items:
            type: string
          maxItems: 100
        customFields:
          type: object
          description: Key-value pairs for custom fields. Max 100KB.

    ContactUpdate:
      allOf:
        - $ref: "#/components/schemas/ContactCreate"
        - type: object
          properties:
            avatarUrl:
              type: string
              format: uri
              maxLength: 2048
            optedOutSms:
              type: boolean
            optedOutEmail:
              type: boolean
            metadata:
              type: object

    Company:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        domain:
          type: string
        industry:
          type: string
        size:
          type: string
          enum: [ "1-10", "11-50", "51-200", "201-500", "501-1000", "1001+" ]
        website:
          type: string
          format: uri
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string
          default: US
        description:
          type: string
        customFields:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CompanyCreate:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
        domain:
          type: string
        industry:
          type: string
        size:
          type: string
          enum: [ "1-10", "11-50", "51-200", "201-500", "501-1000", "1001+" ]
        website:
          type: string
          format: uri
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string
        description:
          type: string
        customFields:
          type: object

    Deal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        pipelineId:
          type: string
          format: uuid
        stageId:
          type: string
          format: uuid
        title:
          type: string
        value:
          type: number
          format: double
          description: Deal value as decimal
        currency:
          type: string
          default: USD
        status:
          type: string
          enum: [ open, won, lost ]
          default: open
        priority:
          type: string
          enum: [ low, medium, high, urgent ]
          default: medium
