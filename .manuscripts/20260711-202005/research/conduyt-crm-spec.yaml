openapi: "3.1.0"
x-mcp:
  transport: [ stdio, http ]
  orchestration: code
  endpoint_tools: hidden
info:
  title: Conduyt API
  version: "1.0.0"
  description: |
    The Conduyt CRM API provides programmatic access to your CRM data including
    contacts, companies, deals, pipelines, tasks, notes, automations, invoices,
    email sequences, and more.

    ## Authentication

    All authenticated endpoints require a Bearer token (API key) in the
    `Authorization` header:

    ```
    Authorization: Bearer cdy_<your-api-key>
    ```

    API keys are generated in **Settings > API Keys** within the Conduyt
    dashboard. Keys use the `cdy_` prefix and are hashed with bcrypt on
    creation — the full key is shown exactly once at creation time.

    Session cookie authentication (`conduyt_session`) is also supported for
    browser-based clients but is not recommended for integrations.

    ## Rate Limiting

    API keys enforce a per-key rate limit. New keys default to 100 requests per
    minute and can be configured at creation time or with PATCH `/api-keys/{id}`.
    Some public and provider-facing endpoints also enforce stricter per-IP or
    per-account limits. When exceeded, the API returns `429 Too Many Requests`
    with a `Retry-After` header indicating seconds until the next allowed
    request.

    | Endpoint Group      | Limit               |
    |---------------------|---------------------|
    | API keys            | Default 100 / min per key |
    | Login/reset         | 5 / min per IP      |
    | Registration        | 3 / hour per IP     |
    | Contact/Deal create | 30 / min per IP     |
    | Inbound messages    | 120 / min per account/IP |

    ## Pagination

    List endpoints support cursor-based pagination via query parameters:

    - `page` — Page number (default: 1)
    - `per_page` — Items per page (default: 50, max: 200)

    Responses include a `meta` object: `{ page, per_page, total }`.

    ## Response Format

    All successful responses wrap data in a `data` envelope:
    ```json
    { "data": { ... } }
    ```

    Error responses use:
    ```json
    { "error": "Human-readable error message" }
    ```

    ## Multi-Tenancy

    Conduyt is multi-tenant. All data is scoped to the authenticated user's
    current account. API keys are bound to a specific account at creation time.

    ## Webhook Events

    Outbound webhooks fire on events including:
    `contact.created`, `contact.updated`, `contact.deleted`,
    `deal.created`, `deal.updated`, `deal.won`, `deal.lost`,
    `task.created`, `task.completed`, `note.created`,
    `appointment.created`, `appointment.updated`,
    `form.submitted`, `invoice.paid`

    Payloads are signed with HMAC-SHA256 using the webhook's secret. Retry
    schedule: 1m, 5m, 30m, 2h, 12h, 72h (7 total attempts including the initial delivery).
  contact:
    name: Conduyt Support
    url: https://conduyt.app
    email: support@conduyt.app
  license:
    name: Proprietary
    url: https://conduyt.app/terms

servers:
  - url: https://conduyt.app/api/v1
    description: Production

tags:
  - name: Auth
    description: Authentication, registration, password management
  - name: Contacts
    description: Contact management, tagging, scoring, import/export, merge, duplicates
  - name: Companies
    description: Company (organization) management
  - name: Deals
    description: Deal/opportunity management within pipelines
  - name: Pipelines
    description: Sales pipeline and stage management
  - name: Tasks
    description: Task management with assignment and due dates
  - name: Notes
    description: Notes attached to contacts or deals
  - name: Tags
    description: Tag management and merging
  - name: Activities
    description: Activity feed and logging
  - name: Messages
    description: SMS and email message history
  - name: Email
    description: Send individual and bulk emails
  - name: Email Templates
    description: Reusable email/SMS templates
  - name: Email Sequences
    description: Multi-step email sequences with enrollment
  - name: Conversations
    description: Threaded conversation view per contact
  - name: Automations
    description: Workflow automations (native + n8n), publishing, analytics
  - name: Automation Executions
    description: Automation execution logs and step details
  - name: Workflows
    description: Simple trigger-action workflows
  - name: Drip Campaigns
    description: SMS drip campaign engine
  - name: Custom Fields
    description: Custom field definitions for contacts and deals
  - name: Calendars
    description: Internal calendar and appointment management
  - name: Calendar Connections
    description: Google / Microsoft calendar sync
  - name: Booking Pages
    description: Public booking pages (Calendly-style)
  - name: Appointments
    description: Appointment scheduling
  - name: Forms
    description: Lead capture forms and submissions
  - name: Invoices
    description: Invoice creation, sending, payments, PDF generation
  - name: Products
    description: Product catalog for invoices
  - name: Notifications
    description: In-app notifications
  - name: Files
    description: File uploads and attachments
  - name: API Keys
    description: API key management
  - name: Users
    description: Team member management and invitations
  - name: Settings
    description: Account settings, branding, SMS/Twilio configuration
  - name: Billing
    description: Stripe billing, checkout, and subscription status
  - name: Webhooks
    description: Outbound webhook management and logs
  - name: Integrations
    description: Third-party integrations (Zapier, etc.)
  - name: Reports
    description: Pipeline, revenue, activity, team, and custom reports
  - name: Search
    description: Global search across contacts, companies, deals
  - name: Bulk Operations
    description: Bulk update, delete, and tag contacts and deals
  - name: Imports
    description: CSV import jobs with mapping and deduplication
  - name: Smart Lists
    description: Static contact lists
  - name: Lead Routing
    description: Lead assignment routing rules and assignment history
  - name: Scoring Rules
    description: Lead scoring rule management
  - name: Document Templates
    description: Proposal and contract templates with merge fields
  - name: Email Domains
    description: Custom email domain verification (Resend)
  - name: Dialer
    description: Click-to-call dialer via Twilio
  - name: Calls
    description: Call log management
  - name: Chat
    description: Internal team chat channels and messages
  - name: Push Notifications
    description: Web push subscription management
  - name: Dashboard
    description: Dashboard summary metrics
  - name: AI
    description: AI-powered features (chat, email compose, contact enrichment)
  - name: Admin
    description: Super-admin account management and impersonation
  - name: Public
    description: Unauthenticated public endpoints (booking, form submit)

security:
  - BearerAuth: []

paths:
  # ──────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      summary: Register a new account
      description: Creates a new user and account. Rate limited to 3 requests per hour per IP.
      tags: [ Auth ]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ email, password, accountName ]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 254
                password:
                  type: string
                  minLength: 8
                firstName:
                  type: string
                lastName:
                  type: string
                accountName:
                  type: string
                  minLength: 2
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/login:
    post:
      operationId: login
      summary: Log in with email and password
      description: Authenticates user credentials and returns a session cookie. Rate limited to 5 requests per 15 minutes per IP.
      tags: [ Auth ]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ email, password ]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                accountId:
                  type: string
                  format: uuid
                  description: Target account ID (optional, defaults to first account)
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/logout:
    post:
      operationId: logout
      summary: Log out (destroy session)
      tags: [ Auth ]
      responses:
        "200":
          description: Logged out successfully

  /auth/me:
    get:
      operationId: getMe
      summary: Get current authenticated user
      tags: [ Auth ]
      responses:
        "200":
          description: Current user and account info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/change-password:
    post:
      operationId: changePassword
      summary: Change password (authenticated)
      tags: [ Auth ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ currentPassword, newPassword ]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password changed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      summary: Request a password reset email
      tags: [ Auth ]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ email ]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset email sent (always returns 200 to prevent email enumeration)

  /auth/reset-password:
    post:
      operationId: resetPassword
      summary: Reset password with token
      tags: [ Auth ]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ token, password ]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password reset successful
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/switch-account:
    post:
      operationId: switchAccount
      summary: Switch to a different account
      tags: [ Auth ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ accountId ]
              properties:
                accountId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Account switched successfully
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/accept-invite:
    post:
      operationId: acceptInvite
      summary: Accept a team invitation
      tags: [ Auth ]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ token, password ]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        "200":
          description: Invite accepted, session created
        "400":
          $ref: "#/components/responses/BadRequest"

  # ──────────────────────────────────────────────
  # Contacts
  # ──────────────────────────────────────────────
  /contacts:
    get:
      operationId: listContacts
      summary: List contacts
      description: |
        Returns a paginated list of contacts. Supports search, filtering by tag,
        source, company, assigned user, date ranges, lead score, and smart views.

        Smart views: `needs_follow_up`, `hot_leads`, `new_this_week`,
        `recently_won`, `untagged`, `missing_email`, `missing_phone`.
      tags: [ Contacts ]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - $ref: "#/components/parameters/SearchParam"
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by single tag name
        - name: tags
          in: query
          schema:
            type: string
          description: Filter by comma-separated tag names
        - name: source
          in: query
          schema:
            type: string
        - name: company
          in: query
          schema:
            type: string
        - name: assigned_to
          in: query
          schema:
            type: string
            format: uuid
        - name: created_from
          in: query
          schema:
            type: string
            format: date-time
        - name: created_to
          in: query
          schema:
            type: string
            format: date-time
        - name: updated_from
          in: query
          schema:
            type: string
            format: date-time
        - name: updated_to
          in: query
          schema:
            type: string
            format: date-time
        - name: min_score
          in: query
          schema:
            type: integer
          description: Minimum lead score filter
        - name: smart_view
          in: query
          schema:
            type: string
            enum:
              - needs_follow_up
              - hot_leads
              - new_this_week
              - recently_won
              - untagged
              - missing_email
              - missing_phone
        - name: sort
          in: query
          schema:
            type: string
            enum: [ createdAt, updatedAt, firstName, lastName, email, company, leadScore ]
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [ asc, desc ]
            default: desc
      responses:
        "200":
          description: Paginated list of contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createContact
      summary: Create a contact
      description: Creates a new contact. Rate limited to 30 requests per minute.
      tags: [ Contacts ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactCreate"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          description: Trial expired or contact limit reached
        "413":
          description: Custom fields payload too large
        "429":
          $ref: "#/components/responses/RateLimited"

  /contacts/{id}:
    get:
      operationId: getContact
      summary: Get a contact by ID
      tags: [ Contacts ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateContact
      summary: Update a contact
      tags: [ Contacts ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteContact
      summary: Soft-delete a contact
      tags: [ Contacts ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Contact deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /contacts/{id}/tags:
    post:
      operationId: addContactTag
      summary: Add a tag to a contact
      tags: [ Contacts ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ tagId ]
              properties:
                tagId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Tag added
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      x-generated: true
      operationId: deleteContactsIdTags
      summary: Delete contacts id tags
      tags:
        - Contacts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
    get:
      x-generated: true
      operationId: getContactsIdTags
      summary: Get contacts id tags
      tags:
        - Contacts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"

  /contacts/{id}/tags/{tagId}:
    delete:
      operationId: removeContactTag
      summary: Remove a tag from a contact
      tags: [ Contacts ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: tagId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Tag removed
        "404":
          $ref: "#/components/responses/NotFound"

  /contacts/{id}/score:
    get:
      operationId: getContactScore
      summary: Get a contact's lead score breakdown
      tags: [ Contacts ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Score details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"

  /contacts/duplicates:
    get:
      operationId: findDuplicateContacts
      summary: Find duplicate contacts
      tags: [ Contacts ]
      responses:
        "200":
          description: List of duplicate contact groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"

  /contacts/merge:
    post:
      operationId: mergeContacts
      summary: Merge two contacts
      tags: [ Contacts ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ primaryId, secondaryId ]
              properties:
                primaryId:
                  type: string
                  format: uuid
                  description: Contact to keep
                secondaryId:
                  type: string
                  format: uuid
                  description: Contact to merge into primary (will be deleted)
      responses:
        "200":
          description: Contacts merged
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /contacts/export:
    get:
      operationId: exportContacts
      summary: Export contacts as CSV
      tags: [ Contacts ]
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string

  /contacts/import:
    post:
      operationId: importContacts
      summary: Import contacts from CSV
      tags: [ Contacts ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"

  /contacts/import/template:
    get:
      operationId: getImportTemplate
      summary: Download CSV import template
      tags: [ Contacts ]
      responses:
        "200":
          description: CSV template
          content:
            text/csv:
              schema:
                type: string

  /smart-views:
    get:
      operationId: listSmartViews
      summary: List available smart view definitions
      tags: [ Contacts ]
      responses:
        "200":
          description: Smart view configurations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
    post:
      x-generated: true
      operationId: postSmartViews
      summary: Create / invoke smart-views
      tags:
        - Smart Views
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: See GET /schema/api-catalog (authenticated) for the full field-level request schema of this endpoint.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"

  /contact:
    post:
      operationId: upsertContact
      summary: Upsert a contact (webhook-friendly)
      description: Creates or updates a contact by email or phone match. Designed for inbound webhook integrations.
      tags: [ Contacts ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactCreate"
      responses:
        "200":
          description: Contact created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"

  # ──────────────────────────────────────────────
  # Companies
  # ──────────────────────────────────────────────
  /companies:
    get:
      operationId: listCompanies
      summary: List companies
      tags: [ Companies ]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - $ref: "#/components/parameters/SearchParam"
        - name: industry
          in: query
          schema:
            type: string
        - name: size
          in: query
          schema:
            type: string
            enum: [ "1-10", "11-50", "51-200", "201-500", "501-1000", "1001+" ]
        - name: sort
          in: query
          schema:
            type: string
            enum: [ createdAt, updatedAt, name ]
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [ asc, desc ]
            default: desc
      responses:
        "200":
          description: Paginated list of companies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
    post:
      operationId: createCompany
      summary: Create a company
      tags: [ Companies ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyCreate"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"

  /companies/{id}:
    get:
      operationId: getCompany
      summary: Get a company by ID
      tags: [ Companies ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Company details with contact/deal counts and total value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateCompany
      summary: Update a company
      tags: [ Companies ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyCreate"
      responses:
        "200":
          description: Company updated
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCompany
      summary: Soft-delete a company
      tags: [ Companies ]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Company deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────
  # Deals
  # ──────────────────────────────────────────────
  /deals:
    get:
      operationId: listDeals
      summary: List deals
      description: Returns deals with Kanban-optimized sort order (stage, sortOrder, then requested sort).
      tags: [ Deals ]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: pipeline
          in: query
          schema:
            type: string
            format: uuid
          description: "Filter by pipeline ID. Aliases also accepted: pipeline_id, pipelineId."
        - name: stage
          in: query
          schema:
            type: string
            format: uuid
          description: "Filter by stage ID. Aliases also accepted: stage_id, stageId."
        - name: status
          in: query
          schema:
            type: string
            enum: [ open, won, lost ]
        - name: assigned_to
          in: query
          schema:
            type: string
            format: uuid
        - name: sort
          in: query
          schema:
            type: string
            enum: [ createdAt, updatedAt, title, value ]
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [ asc, desc ]
            default: desc
      responses:
        "200":
          description: Paginated list of deals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
    post:
      operationId: createDeal
      summary: Create a deal
