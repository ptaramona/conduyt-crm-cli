  # ──────────────────────────────────────────────
  # Imports
  # ──────────────────────────────────────────────
  /imports:
    get:
      operationId: listImports
      summary: List import jobs
      tags: [Imports]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Paginated import jobs
    post:
      operationId: createImport
      summary: Create an import job
      tags: [Imports]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [objectType]
              properties:
                objectType:
                  type: string
                  enum: [contacts, opportunities, companies]
                fileName:
                  type: string
                format:
                  type: string
                  enum: [csv, json]
                  description: "Set to 'json' to submit inline row objects via 'rows' instead of a CSV file. In JSON mode fileName and mappings are optional (synthesized server-side)."
                rows:
                  type: array
                  description: "JSON mode only: row objects (e.g. deals when objectType is 'opportunities'). Each object's keys map to Conduyt fields by name; a nested 'customFields' object is flattened to customFields.<key> columns."
                  items:
                    type: object
                    additionalProperties: true
                fileUrl:
                  type: string
                  format: uri
                importMode:
                  type: string
                  enum: [create_and_update, create_only, update_only]
                  default: create_and_update
                mappings:
                  type: object
                  description: "CSV column to Conduyt field mapping"
                removeDuplicates:
                  type: boolean
                  default: false
                duplicateCheckFields:
                  type: array
                  items:
                    type: string
                smartListId:
                  type: string
                  format: uuid
                tagIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "201":
          description: Import job created

  /imports/upload:
    post:
      operationId: uploadImportFile
      summary: Upload a CSV file for import
      tags: [Imports]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: File uploaded with preview data

  /imports/{id}:
    get:
      operationId: getImport
      summary: Get import job status
      tags: [Imports]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Import job details with progress stats
        "404":
          $ref: "#/components/responses/NotFound"

